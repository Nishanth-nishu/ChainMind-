apiVersion: v1
kind: Service
metadata:
  name: chainmind-api
  namespace: chainmind
  labels:
    app: chainmind
    component: api
spec:
  type: ClusterIP
  selector:
    app: chainmind
    component: api
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: chainmind-api-lb
  namespace: chainmind
  labels:
    app: chainmind
    component: api
spec:
  type: LoadBalancer
  selector:
    app: chainmind
    component: api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
