apiVersion: v1
kind: ConfigMap
metadata:
  name: chainmind-config
  namespace: chainmind
data:
  ENVIRONMENT: "production"
  LOG_FORMAT: "json"
  LOG_LEVEL: "INFO"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"
  GRPC_HOST: "0.0.0.0"
  GRPC_PORT: "50051"
  RETRIEVAL_MODE: "hybrid"
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  GUARDRAILS_ENABLED: "true"
  TRACING_ENABLED: "true"
  METRICS_ENABLED: "true"
  MAX_AGENT_STEPS: "15"
