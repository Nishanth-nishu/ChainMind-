# =============================================================================
# ChainMind — Docker Compose for local development
# =============================================================================
version: "3.9"

services:
  # --- ChainMind API Server ---
  chainmind-api:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: chainmind-api
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - ENVIRONMENT=development
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_FORMAT=console
    volumes:
      - chainmind-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  # --- ChainMind gRPC Server ---
  chainmind-grpc:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: chainmind-grpc
    command: ["python", "-m", "chainmind.grpc_service.server"]
    ports:
      - "50051:50051"
    env_file:
      - ../../.env
    environment:
      - GRPC_HOST=0.0.0.0
      - GRPC_PORT=50051
    volumes:
      - chainmind-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  # --- Redis (optional — for distributed memory) ---
  redis:
    image: redis:7-alpine
    container_name: chainmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  chainmind-data:
  redis-data:
